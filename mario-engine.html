// ── Audio ────────────────────────────────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state==='suspended') audioCtx.resume();
}
function playSfx(freq,type,dur,vol=0.1,slide=0) {
    if (!audioCtx||audioCtx.state==='suspended') return;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(1,freq+slide), audioCtx.currentTime+dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
}
let bgmInterval = null;
function playBgm() {
    if (bgmInterval) clearInterval(bgmInterval);
    const notes = [330,0,392,0,523,0,392,330,0,294,0,330,0,262,0,0,
                   392,0,523,0,659,0,523,392,0,349,0,392,0,330,0,0];
    let step = 0;
    bgmInterval = setInterval(()=>{
        if (gameState!==STATE.PLAYING) return;
        const f = notes[step++%notes.length];
        if (f) playSfx(f,'square',0.1,0.022);
    }, 140);
}

// ── Input ────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e=>{
    keys[e.code]=true; ensureAudio();
    if (gameState===STATE.TITLE && (e.code==='Enter'||e.code==='Space')) { startGame(); if(player) player.jumpConsumed=true; }
    if (e.code==='Escape') { if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;} window.location.href='https://mario.apine.net'; }
    if (gameState===STATE.WIN && (e.code==='Enter'||e.code==='Space')) {
        gameState=STATE.TITLE; if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}
    }
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e=>keys[e.code]=false);

// ── Entity Base ──────────────────────────────────────────────────────────
class Entity {
    constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.vx=0;this.vy=0;this.grounded=false;this.dead=false;}
    get midX(){return this.x+this.w/2;}
    get midY(){return this.y+this.h/2;}
    solid(r,c){ if(!levelTiles[r]) return false; return levelTiles[r][c]===1; }
    update(dt){
        this.vy=Math.min(this.vy+GRAVITY*dt, MAX_FALL);
        this.x+=this.vx*dt; this.collideX();
        this.y+=this.vy*dt; this.collideY();
    }
    collideX(){
        const l=Math.floor(this.x/TILE), r=Math.floor((this.x+this.w)/TILE);
        const t=Math.floor(this.y/TILE), b=Math.floor((this.y+this.h-1)/TILE);
        for(let row=t;row<=b;row++){
            if(this.solid(row,l)){this.x=(l+1)*TILE; this.vx=Math.abs(this.vx); this.onWallHit();}
            if(this.solid(row,r)){this.x=r*TILE-this.w; this.vx=-Math.abs(this.vx); this.onWallHit();}
        }
    }
    collideY(){
        this.grounded=false;
        const l=Math.floor(this.x/TILE), r=Math.floor((this.x+this.w-1)/TILE);
        const t=Math.floor(this.y/TILE), b=Math.floor((this.y+this.h)/TILE);
        for(let c=l;c<=r;c++){
            if(this.solid(b,c)){this.y=b*TILE-this.h; this.vy=0; this.grounded=true;}
            if(this.solid(t,c)){this.y=(t+1)*TILE; this.vy=0;}
        }
    }
    onWallHit(){}
}

// ── Mario (on bike) ──────────────────────────────────────────────────────
class Mario extends Entity {
    constructor(x,y){
        super(x,y,24,30);
        this.invuln=0; this.jumpConsumed=false; this.facing=1;
        this.stompCombo=0; this.wheelRot=0; this.puddleBoost=0; this.attached=null;
        this.big=false; this.fire=false; this.fireCooldown=0;
    }
    update(dt){
        if(this.invuln>0) this.invuln-=dt;
        if(this.puddleBoost>0) this.puddleBoost-=dt;

        if(LEVEL.mode === 'underwater'){
            // ── Swim physics ───────────────────────────────────────────────
            const swspeed = 200;
            if(keys['ArrowLeft'] ||keys['KeyA']){ this.vx=-swspeed; this.facing=-1; }
            else if(keys['ArrowRight']||keys['KeyD']){ this.vx= swspeed; this.facing= 1; }
            else this.vx *= 0.85;
            if(keys['ArrowUp']  ||keys['KeyW']||keys['Space']) this.vy = -swspeed;
            else if(keys['ArrowDown']||keys['KeyS'])            this.vy =  swspeed;
            else this.vy *= 0.85;
            this.x += this.vx*dt; this.y += this.vy*dt;
            this.x = Math.max(0, Math.min(this.x, WW-this.w));
            this.y = Math.max(40, Math.min(this.y, FLOOR_Y-this.h));
            if(this.x > WIN_X && this.starPower){
                gameState=STATE.WIN;
                [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSfx(f,'sine',0.25,0.12),i*150));
            }
            return;
        }

        // ── Trapeze attachment ─────────────────────────────────────────────
        if(this.attached){
            const wj=keys['ArrowUp']||keys['Space']||keys['KeyW'];
            if(!wj) this.jumpConsumed=false;
            return; // Trapeze.update() controls position
        }

        // ── Normal land physics ────────────────────────────────────────────
        if(this.grounded) this.stompCombo=0;
        const inDownhill = this.x>DOWNHILL_X1 && this.x<DOWNHILL_X2;
        const speed=(keys['ShiftLeft']||keys['ShiftRight'])?RUN:WALK;
        if(keys['ArrowLeft']||keys['KeyA']){ this.vx=-speed; this.facing=-1; }
        else if(keys['ArrowRight']||keys['KeyD']){ this.vx=speed; this.facing=1; }
        else {
            if(inDownhill && this.grounded){
                this.vx += 90*dt; this.vx = Math.min(this.vx, 480); this.vx = Math.max(this.vx, 80); this.facing=1;
            } else { this.vx=0; }
        }
        if(inDownhill && this.grounded && (keys['ArrowRight']||keys['KeyD'])) this.vx = Math.min(this.vx + 60*dt, 490);
        if(this.grounded && Math.abs(this.vx)>10) this.wheelRot+=this.vx*dt*0.12;
        const wj=keys['ArrowUp']||keys['Space']||keys['KeyW'];
        if(wj && !this.jumpConsumed && this.grounded){ this.vy=JUMP_V; this.grounded=false; this.jumpConsumed=true; playSfx(300,'sine',0.1,0.08,180); }
        if(!wj) this.jumpConsumed=false;
        if(!wj && this.vy<-180) this.vy+=GRAVITY*dt*1.6;
        // ── Fire shooting ──────────────────────────────────────────────────
        if(this.fireCooldown>0) this.fireCooldown-=dt;
        if(keys['KeyX'] && this.fire && this.fireCooldown<=0){
            this.fireCooldown=0.4;
            entities.push(new Fireball(this.x+(this.facing>0?this.w+2:-6), this.y+8, this.facing));
            playSfx(600,'square',0.06,0.08,100);
        }
        super.update(dt);
        if(this.x<0) this.x=0;
        if(this.x>WW-this.w) this.x=WW-this.w;
        if(this.y>WH) this.killInstant();
        if(this.x>WIN_X && this.grounded && (LEVEL.mode!=='castle'||bossDefeated)){
            gameState=STATE.WIN;
            [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSfx(f,'sine',0.25,0.12),i*150));
        }
    }
    die(insta=false){
        if(gameState===STATE.DYING) return;
        if(!insta){
            if(this.invuln>0) return;
            if(this.fire){ this.fire=false; this.invuln=1.5; playSfx(200,'sawtooth',0.2,0.1,-80); return; }
            if(this.big){ this.big=false; this.h=30; this.y+=16; this.invuln=1.5; playSfx(200,'sawtooth',0.2,0.1,-80); return; }
        }
        gameState=STATE.DYING;
        playSfx(350,'sawtooth',0.5,0.15,-220);
        setTimeout(()=>{ resetLevel(); },1600);
    }
    killInstant(){ this.big=false; this.fire=false; this.die(true); }
    draw(ctx){
        if(this.invuln>0 && Math.floor(Date.now()/80)%2===0) return;
        if(LEVEL.mode!=='normal'){ this.drawCircus(ctx); return; }
        ctx.save();
        const cx=Math.floor(this.x+this.w/2);
        const baseY=Math.floor(this.y+this.h);
        ctx.translate(cx, baseY);
        if(this.facing===-1) ctx.scale(-1,1);
        const wr=this.wheelRot;
        [-11,11].forEach(wx=>{
            ctx.strokeStyle='#222'; ctx.lineWidth=3.5;
            ctx.beginPath(); ctx.arc(wx,-9,9,0,Math.PI*2); ctx.stroke();
            ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
            [0,Math.PI/2].forEach(a=>{
                ctx.beginPath();
                ctx.moveTo(wx+Math.cos(wr+a)*9,-9+Math.sin(wr+a)*9);
                ctx.lineTo(wx-Math.cos(wr+a)*9,-9-Math.sin(wr+a)*9);
                ctx.stroke();
            });
            ctx.fillStyle='#bbb'; ctx.beginPath(); ctx.arc(wx,-9,2.5,0,Math.PI*2); ctx.fill();
        });
        ctx.strokeStyle='#e87010'; ctx.lineWidth=2.5;
        ctx.beginPath();
        ctx.moveTo(-11,-9); ctx.lineTo(0,-22); ctx.lineTo(11,-9);
        ctx.moveTo(0,-22); ctx.lineTo(-4,-27);
        ctx.moveTo(-11,-9); ctx.lineTo(-4,-27);
        ctx.stroke();
        ctx.strokeStyle='#666'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(11,-20); ctx.lineTo(9,-27); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(9,-27); ctx.lineTo(15,-27); ctx.lineTo(15,-24); ctx.stroke();
        ctx.fillStyle='#5a2a08'; ctx.fillRect(-8,-29,9,3);
        ctx.translate(-1,-29);
        const H=26;
        ctx.fillStyle='#1a3fcc'; ctx.fillRect(-6,H-10,5,10); ctx.fillRect(2,H-10,5,10);
        ctx.fillStyle='#3d1c02'; ctx.fillRect(-8,H-4,7,5); ctx.fillRect(2,H-4,7,5);
        ctx.fillStyle='#1a3fcc'; ctx.fillRect(-6,H-20,12,11);
        ctx.fillStyle='#cc2200'; ctx.fillRect(-10,H-18,5,9); ctx.fillRect(5,H-18,5,9);
        ctx.fillStyle='#f5c499'; ctx.fillRect(-5,H-29,10,9);
        ctx.fillStyle='#cc2200'; ctx.fillRect(-7,H-36,14,5); ctx.fillRect(-5,H-41,12,6);
        ctx.fillStyle='#1a0800'; ctx.fillRect(1,H-28,4,3);
        ctx.restore();
    }
    drawCircus(ctx){
        ctx.save();
        const cx=Math.floor(this.x+this.w/2);
        const baseY=Math.floor(this.y+this.h);
        ctx.translate(cx, baseY);
        if(this.facing===-1) ctx.scale(-1,1);
        if(this.big||this.fire) ctx.scale(1,1.53); // bigger when powered up
        // Fire aura
        if(this.fire){
            const ft=Date.now()*0.005;
            ctx.save();
            for(let i=0;i<6;i++){
                const a=i*Math.PI/3+ft;
                ctx.fillStyle=`rgba(255,${80+i*30},0,${0.35+0.2*Math.sin(ft*3+i)})`;
                ctx.beginPath(); ctx.arc(Math.cos(a)*14,-22+Math.sin(a)*9,5,0,Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }
        const run=Math.sin(Date.now()*0.016)*(Math.abs(this.vx)>10?1:0);
        const hang=this.attached!==null;
        const overalls=this.fire?'#ffffff':'#1a3fcc';
        // Arms — raised when hanging from trapeze
        ctx.fillStyle='#cc2200';
        if(hang){
            ctx.fillRect(-12,-36,6,14); ctx.fillRect(6,-36,6,14); // arms up
            ctx.fillStyle='#f5c499'; ctx.fillRect(-13,-42,7,8); ctx.fillRect(7,-42,7,8); // hands
        } else {
            ctx.fillRect(-12,-28,6,10); ctx.fillRect(6,-28,6,10); // arms at side
        }
        // Legs
        ctx.fillStyle=overalls;
        ctx.fillRect(-7,-12+run*3,6,12);
        ctx.fillRect(2,-12-run*3,6,12);
        // Shoes
        ctx.fillStyle='#3d1c02';
        ctx.fillRect(-9,-2+run*3,8,4);
        ctx.fillRect(1,-2-run*3,8,4);
        // Body
        ctx.fillStyle=overalls; ctx.fillRect(-8,-26,16,15);
        ctx.fillStyle='#cc2200'; ctx.fillRect(-10,-24,4,11); ctx.fillRect(6,-24,4,11);
        // Head
        ctx.fillStyle='#f5c499'; ctx.fillRect(-6,-36,12,10);
        // Cap
        ctx.fillStyle='#cc2200'; ctx.fillRect(-8,-40,16,5);
        ctx.fillRect(-6,-46,14,7);
        // Mustache
        ctx.fillStyle='#1a0800'; ctx.fillRect(0,-34,5,2);
        ctx.restore();
    }
}

// ── Snake ────────────────────────────────────────────────────────────────
class Snake extends Entity {
    constructor(x,y){ super(x,y,34,18); this.vx=-50; this.bobT=Math.random()*Math.PI*2; this.squished=false; this.squishTimer=0; }
    update(dt){
        if(this.dead) return;
        if(this.squished){ this.squishTimer-=dt; if(this.squishTimer<=0) this.dead=true; return; }
        this.bobT+=dt; super.update(dt);
        const nx=this.vx>0?this.x+this.w+2:this.x-2;
        const lty=Math.floor((this.y+this.h+2)/TILE), ltx=Math.floor(nx/TILE);
        if(!levelTiles[lty]||levelTiles[lty][ltx]===0) this.vx*=-1;
        if(rectHit(this,player)){
            if(player.vy>=0 && player.y+player.h<this.y+this.h-4){
                this.squished=true; this.squishTimer=0.4; player.vy=-380; player.stompCombo++;
                score+=150*player.stompCombo; spawnParticles(this.midX,this.midY,'#3aaa3a',8);
                playSfx(120,'square',0.14,0.1,-60);
            } else if(player.invuln<=0){ player.die(); }
        }
    }
    draw(ctx){
        if(this.dead) return;
        ctx.save();
        const wave=Math.sin(this.bobT*4)*2.5, flip=this.vx>0;
        ctx.translate(this.x+(flip?this.w:0), this.y+18);
        if(flip) ctx.scale(-1,1);
        if(this.squished){
            ctx.fillStyle='#2a7a2a'; ctx.beginPath(); ctx.ellipse(17,1,20,3,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#aadd88'; ctx.beginPath(); ctx.ellipse(17,1,10,1.5,0,0,Math.PI*2); ctx.fill();
            [8,26].forEach(ex=>{ ctx.strokeStyle='#ff0'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(ex-3,-2); ctx.lineTo(ex+3,2); ctx.stroke(); ctx.beginPath(); ctx.moveTo(ex+3,-2); ctx.lineTo(ex-3,2); ctx.stroke(); });
        } else {
            ctx.fillStyle='#2d8c2d'; ctx.beginPath(); ctx.ellipse(6,-6+wave,7,6,0,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(16,-4-wave,8,7,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#1a6a1a'; ctx.beginPath(); ctx.ellipse(26,-6+wave,10,8,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#aadd88'; ctx.beginPath(); ctx.ellipse(16,-6+wave*0.3,7,4,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(30,-8+wave,3,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(31,-8+wave,1.5,0,Math.PI*2); ctx.fill();

// ── Stop Sign ────────────────────────────────────────────────────────────
class StopSign {
    constructor(x){
        this.x=x; this.signY=FLOOR_Y-140;
        // painted "stop here" box: 150px wide, ending 20px before the post
        this.boxX=x-170; this.boxW=150;
        this.dangerX1=x-20; this.dangerX2=x+64;
        this.flash=0; this.dead=false; this.cleared=false;
    }
    update(dt){
        if(this.dead) return;
        this.flash=Math.max(0,this.flash-dt*4);
        if(!player) return;
        const inDanger=player.x+player.w>this.dangerX1 && player.x<this.dangerX2;
        const inBox=player.x+player.w/2>=this.boxX && player.x+player.w/2<=this.boxX+this.boxW;
        if(inDanger && Math.abs(player.vx)>55){
            this.flash=1;
            if(player.invuln<=0) player.die(true);
        } else if((inBox||inDanger) && !this.cleared && Math.abs(player.vx)<=10){
            this.cleared=true;
            spawnParticles(this.x+22, this.signY+25, '#ffdd00', 14);
            playSfx(600,'sine',0.12,0.18,200);
            setTimeout(()=>{ this.dead=true; }, 450);
        }
    }
    draw(ctx){
        if(this.dead) return;
        const x=this.x, sy=this.signY;
        const bx=this.boxX, bw=this.boxW;
        const pulse=Math.sin(Date.now()*0.004)*0.5+0.5;

        // ── Painted stop box on road ──────────────────────────────────────
        if(!this.cleared){
            // Yellow fill
            ctx.fillStyle=`rgba(255,210,0,${0.22+0.1*pulse})`;
            ctx.fillRect(bx, FLOOR_Y, bw, TILE);
            // Diagonal hazard stripes
            ctx.save(); ctx.beginPath(); ctx.rect(bx,FLOOR_Y,bw,TILE); ctx.clip();
            ctx.strokeStyle=`rgba(255,255,255,${0.55+0.2*pulse})`; ctx.lineWidth=5;
            for(let lx=bx-TILE;lx<bx+bw+TILE;lx+=24){
                ctx.beginPath(); ctx.moveTo(lx,FLOOR_Y); ctx.lineTo(lx+TILE,FLOOR_Y+TILE); ctx.stroke();
            }
            ctx.restore();
            // Left edge stop-line (thick white)
            ctx.strokeStyle='#fff'; ctx.lineWidth=5;
            ctx.beginPath(); ctx.moveTo(bx,FLOOR_Y); ctx.lineTo(bx,FLOOR_Y+TILE); ctx.stroke();
            // "STOP HERE →" label above the box
            ctx.save();
            ctx.font='bold 11px monospace'; ctx.textAlign='center';
            ctx.fillStyle=`rgba(255,230,0,${0.9+0.1*pulse})`;
            ctx.shadowColor='#000'; ctx.shadowBlur=5;
            ctx.fillText('\u25bc STOP HERE \u25bc', bx+bw/2, FLOOR_Y-6);
            ctx.shadowBlur=0;
            ctx.restore();
        }

        // ── Road "STOP" text ──────────────────────────────────────────────
        for(let i=0;i<4;i++){
            ctx.fillStyle=`rgba(200,40,40,${0.15+i*0.12})`;
            ctx.font='bold 13px monospace'; ctx.textAlign='center';
            ctx.fillText('STOP', x+22, FLOOR_Y+20);
        }
        // ── Post ──────────────────────────────────────────────────────────
        ctx.fillStyle='#999'; ctx.fillRect(x+18,sy+50,8,90);
        ctx.fillStyle='#bbb'; ctx.fillRect(x+19,sy+50,3,90);
        // ── Octagon ───────────────────────────────────────────────────────
        ctx.save();
        ctx.translate(x+22,sy+25);
        if(this.flash>0){ ctx.shadowColor='#ff0000'; ctx.shadowBlur=24*this.flash; }
        ctx.fillStyle='#cc1111';
        ctx.beginPath();
        for(let i=0;i<8;i++){
            const a=i*Math.PI/4-Math.PI/8;
            i===0?ctx.moveTo(Math.cos(a)*24,Math.sin(a)*24):ctx.lineTo(Math.cos(a)*24,Math.sin(a)*24);
        }
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.stroke();
        ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
        ctx.fillText('STOP',0,4);
        ctx.shadowBlur=0;
        ctx.restore();
    }
}

// ── Letter collectible (O, N, E) ─────────────────────────────────────────
const lettersCollected = new Set();
let starSpawned = false;
let bossDefeated = false;
let checkpointX = null;

class Letter {
    constructor(x, y, letter){
        this.x=x; this.y=y; this.w=28; this.h=32;
        this.letter=letter; this.dead=false; this.bobT=Math.random()*Math.PI*2;
    }
    get midX(){ return this.x+this.w/2; }
    get midY(){ return this.y+this.h/2; }
    update(dt){
        if(this.dead) return;
        this.bobT+=dt*1.8;
        if(!player) return;
        const hit=player.x<this.x+this.w&&player.x+player.w>this.x&&player.y<this.y+this.h&&player.y+player.h>this.y;
        if(hit){
            // Enforce order: can't collect this letter until all prior ones are collected
            const idx = LEVEL.letters ? LEVEL.letters.indexOf(this.letter) : 0;
            if(idx > 0 && !LEVEL.letters.slice(0,idx).every(l=>lettersCollected.has(l))){
                // Wrong order — bounce the player back slightly and flash
                player.vx = -180 * player.facing;
                spawnParticles(this.midX,this.midY,'#ff4444',6);
                playSfx(180,'sawtooth',0.08,0.12,-40);
                return;
            }
            this.dead=true;
            lettersCollected.add(this.letter);
            collectCount++;
            score+=300;
            spawnParticles(this.midX,this.midY,'#FFD700',10);
            playSfx(660,'sine',0.15,0.12,300);
            // Check if all letters collected
            if(LEVEL.letters && LEVEL.letters.every(l=>lettersCollected.has(l)) && !starSpawned){
                starSpawned=true;
                setTimeout(()=>{
                    entities.push(new StarPowerup(LEVEL.starX, FLOOR_Y-200));
                    playSfx(880,'square',0.4,0.08);
                },400);
            }
        }
    }
    draw(ctx){
        if(this.dead) return;
        const bob=Math.sin(this.bobT)*4;
        ctx.save();
        ctx.shadowColor='#FFD700'; ctx.shadowBlur=14;
        // Bubble background
        ctx.fillStyle='rgba(0,180,255,0.25)';
        ctx.beginPath(); ctx.arc(this.x+14,this.y+16+bob,18,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(100,220,255,0.6)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(this.x+14,this.y+16+bob,18,0,Math.PI*2); ctx.stroke();
        // Letter
        ctx.fillStyle='#FFD700';
        ctx.font='bold 24px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(this.letter, this.x+14, this.y+16+bob);
        ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
        ctx.restore();
    }
}

// ── Star power-up ─────────────────────────────────────────────────────────
class StarPowerup {
    constructor(x,y){ this.x=x; this.y=y; this.w=32; this.h=32; this.dead=false; this.t=0; }
    get midX(){ return this.x+this.w/2; }
    update(dt){
        if(this.dead) return;
        this.t+=dt;
        this.y = (FLOOR_Y-200) + Math.sin(this.t*2)*30;
        if(!player) return;
        const hit=player.x<this.x+this.w&&player.x+player.w>this.x&&player.y<this.y+this.h&&player.y+player.h>this.y;
        if(hit){
            this.dead=true;
            player.starPower=true;
            player.invuln=99; // invincible while star active
            score+=1000;
            spawnParticles(this.midX,this.y+16,'#FFD700',20);
            spawnParticles(this.midX,this.y+16,'#fff',12);
            playSfx(523,'square',0.1,0.1); setTimeout(()=>playSfx(659,'square',0.1,0.1),100);
            setTimeout(()=>playSfx(784,'square',0.1,0.1),200); setTimeout(()=>playSfx(1047,'square',0.2,0.1),300);
        }
    }
    draw(ctx){
        if(this.dead) return;
        ctx.save();
        const pulse=0.7+0.3*Math.sin(this.t*6);
        ctx.shadowColor='#FFD700'; ctx.shadowBlur=20*pulse;
        ctx.fillStyle=`rgba(255,215,0,${pulse})`;
        // 5-point star
        ctx.beginPath();
        for(let i=0;i<10;i++){
            const a=i*Math.PI/5 - Math.PI/2;
            const r = i%2===0 ? 16 : 7;
            i===0 ? ctx.moveTo(this.x+16+Math.cos(a)*r, this.y+16+Math.sin(a)*r)
                  : ctx.lineTo(this.x+16+Math.cos(a)*r, this.y+16+Math.sin(a)*r);
        }
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.shadowBlur=0;
        // Sparkles around it
        for(let i=0;i<6;i++){
            const a=i*Math.PI/3+this.t*2, r=22+4*Math.sin(this.t*3+i);
            ctx.fillStyle=`rgba(255,255,100,${0.5+0.4*Math.sin(this.t*4+i)})`;
            ctx.beginPath(); ctx.arc(this.x+16+Math.cos(a)*r, this.y+16+Math.sin(a)*r, 2.5, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }
}

// ── Jellyfish enemy (underwater) ──────────────────────────────────────────
class Jellyfish {
    constructor(x,y){ this.x=x; this.y=y; this.w=36; this.h=40; this.t=Math.random()*Math.PI*2; this.vy=30; this.dead=false; }
    get midX(){ return this.x+this.w/2; }
    update(dt){
        if(this.dead) return;
        this.t+=dt;
        // Float up and down in a sinusoidal path
        this.y += Math.sin(this.t*1.2)*40*dt;
        this.x -= 35*dt; // drift left
        if(this.x < -80) this.x = WW + 80;
        if(!player||player.invuln>0) return;
        const hit=player.x<this.x+this.w&&player.x+player.w>this.x&&player.y<this.y+this.h&&player.y+player.h>this.y;
        if(hit) player.die(true);
    }
    draw(ctx){
        if(this.dead) return;
        ctx.save();
        const pulse=0.7+0.3*Math.sin(this.t*3);
        const cx=this.x+18, cy=this.y+16;
        // Bell
        ctx.fillStyle=`rgba(180,100,255,${0.75+0.2*pulse})`;
        ctx.beginPath(); ctx.ellipse(cx,cy,18,14*pulse,0,Math.PI,Math.PI*2); ctx.closePath(); ctx.fill();
        ctx.fillStyle=`rgba(220,160,255,${0.5*pulse})`;
        ctx.beginPath(); ctx.ellipse(cx,cy-4,10,7*pulse,0,Math.PI,Math.PI*2); ctx.closePath(); ctx.fill();
        // Tentacles
        ctx.strokeStyle=`rgba(200,100,255,${0.6*pulse})`; ctx.lineWidth=1.5;
        [-10,-4,2,8,14].forEach((ox,i)=>{
            const len=18+6*Math.sin(this.t*2+i);
            ctx.beginPath();
            ctx.moveTo(cx+ox-9, cy);
            ctx.quadraticCurveTo(cx+ox-9+Math.sin(this.t+i)*8, cy+len*0.6, cx+ox-9+Math.sin(this.t*1.5+i)*5, cy+len);
            ctx.stroke();
        });
        // Glow
        ctx.shadowColor='#aa44ff'; ctx.shadowBlur=12*pulse;
        ctx.fillStyle=`rgba(220,180,255,${0.3*pulse})`;
        ctx.beginPath(); ctx.ellipse(cx,cy,18,14*pulse,0,Math.PI,Math.PI*2); ctx.closePath(); ctx.fill();
        ctx.shadowBlur=0;
        ctx.restore();
    }
}

// ── Coral Wall (underwater obstacle pair) ────────────────────────────────
class CoralWall {

    }
    draw(ctx){
        if(this.fromFloor){
            // Coral rising from seabed — warm orange/red tones
            const g=ctx.createLinearGradient(this.x,this.y+this.h,this.x,this.y);
            g.addColorStop(0,'#993311'); g.addColorStop(1,'#ee6633');
            ctx.fillStyle=g; ctx.fillRect(this.x,this.y,this.w,this.h);
            // Highlight stripe
            ctx.fillStyle='rgba(255,160,100,0.35)'; ctx.fillRect(this.x+5,this.y,8,this.h);
            // Bumpy coral top

                ctx.beginPath(); ctx.arc(this.x+i+4,this.y,5,Math.PI,0); ctx.fill();
            }
        } else {
            // Stalactite hanging from surface — cool grey-blue tones
            const g=ctx.createLinearGradient(this.x,this.y,this.x,this.y+this.h);
            g.addColorStop(0,'#334455'); g.addColorStop(1,'#557799');

            ctx.fillStyle='rgba(150,200,255,0.2)'; ctx.fillRect(this.x+5,this.y,8,this.h);
            // Dripping stalactite tips
            ctx.fillStyle='#446688';
            for(let i=0;i<this.w;i+=9){
                const tipH=8+Math.sin(i)*4;
                ctx.beginPath(); ctx.moveTo(this.x+i,this.y+this.h); ctx.lineTo(this.x+i+4,this.y+this.h+tipH); ctx.lineTo(this.x+i+9,this.y+this.h); ctx.fill();
            }
        }
    }
}

// ── Clown (circus enemy, stompable) ──────────────────────────────────────
class Clown extends Entity {
    constructor(x,y){ super(x,y,28,38); this.vx=(Math.random()<0.5?-1:1)*55; this.t=0; }
    onWallHit(){ this.vx*=-1; }
    update(dt){
        if(this.dead) return;
        this.t+=dt;
        super.update(dt);
        const nx=this.vx>0?this.x+this.w+2:this.x-2;
        const lty=Math.floor((this.y+this.h+2)/TILE), ltx=Math.floor(nx/TILE);
        if(!levelTiles[lty]||levelTiles[lty][ltx]===0) this.vx*=-1;
        if(this.x > WIN_X - 480) this.vx = -Math.abs(this.vx); // never enter end zone
        if(!player||player.invuln>0) return;
        if(rectHit(this,player)){
            if(player.vy>=0&&player.y+player.h<this.y+this.h-6){
                this.dead=true; player.vy=-380; player.stompCombo++;
                score+=150*player.stompCombo;
                spawnParticles(this.midX,this.midY,'#ff44cc',10);
                playSfx(120,'square',0.14,0.1,-60);
            } else { player.die(); }
        }
    }
    draw(ctx){
        if(this.dead) return;
        ctx.save();
        ctx.translate(Math.floor(this.x+this.w/2), Math.floor(this.y+this.h));
        if(this.vx<0) ctx.scale(-1,1);
        const bob=Math.sin(this.t*5)*1.5;
        // Big shoes
        ctx.fillStyle='#ff2200';

// ── Trapeze (swinging bar Mario can grab and launch from) ─────────────────
class Trapeze {
    constructor(pivotX,pivotY,ropeLen,phase){
        this.pivotX=pivotX; this.pivotY=pivotY;
        this.ropeLen=ropeLen||135;
        this.amp=0.85; this.omega=1.7;
        this.phase=phase!==undefined?phase:Math.random()*Math.PI*2;
        this.barW=44; this.t=0; this.dead=false; this.grabCooldown=0;
    }
    get angle(){ return this.amp*Math.sin(this.omega*this.t+this.phase); }
    get barX(){ return this.pivotX+Math.sin(this.angle)*this.ropeLen-this.barW/2; }
    get barY(){ return this.pivotY+Math.cos(this.angle)*this.ropeLen; }
    update(dt){
        this.t+=dt;
        if(this.grabCooldown>0) this.grabCooldown-=dt;
        if(!player) return;
        const bx=this.barX, by=this.barY;
        if(player.attached===this){
            // Player hangs from bar with hands — top of player at bar level
            player.x=bx+this.barW/2-player.w/2;
            player.y=by+2;
            player.vx=0; player.vy=0;
            const wj=keys['ArrowUp']||keys['Space']||keys['KeyW'];
            if(wj&&!player.jumpConsumed){
                // Launch with bar's angular velocity
                const dAdt=this.amp*this.omega*Math.cos(this.omega*this.t+this.phase);
                player.vx=Math.cos(this.angle)*dAdt*this.ropeLen*1.9;
                player.vy=Math.min(-Math.abs(dAdt*this.ropeLen)*1.4,-260);
                player.attached=null; player.jumpConsumed=true; player.grounded=false;
                this.grabCooldown=0.6; // prevent immediate re-grab after launch
                spawnParticles(bx+this.barW/2,by,'#FFD700',8);
                playSfx(440,'sine',0.1,0.1,220);
            }
        } else if(this.grabCooldown<=0){
            // Grab bar with hands: player's top (hands) reaches up into the bar zone
            const grabH = player.x+player.w > bx-12 && player.x < bx+this.barW+12;
            const grabV = player.y < by+32 && player.y > by-24;
            if(grabH && grabV && player.vy <= 80){
                player.attached=this; player.vy=0; player.grounded=false;
                playSfx(350,'square',0.08,0.08,80);
            }
        }
    }
    draw(ctx){
        const bx=this.barX, by=this.barY, px=this.pivotX, py=this.pivotY;
        // Ropes
        ctx.strokeStyle='#cc9944'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(px-4,py); ctx.lineTo(bx+5,by); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px+4,py); ctx.lineTo(bx+this.barW-5,by); ctx.stroke();
        // Bar
        const bg=ctx.createLinearGradient(bx,by-4,bx,by+6);
        bg.addColorStop(0,'#cc7744'); bg.addColorStop(1,'#7a3a10');
        ctx.fillStyle=bg; ctx.fillRect(bx,by-4,this.barW,8);
        // Red tape on ends
        ctx.fillStyle='#dd1111'; ctx.fillRect(bx,by-4,7,8); ctx.fillRect(bx+this.barW-7,by-4,7,8);
        // Rope knot circles
        ctx.fillStyle='#aaa';
        ctx.beginPath(); ctx.arc(bx+5,by,3.5,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(bx+this.barW-5,by,3.5,0,Math.PI*2); ctx.fill();
        // Pivot ring
        ctx.fillStyle='#bbb'; ctx.beginPath(); ctx.arc(px,py,6,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill();
    }
}

// ── UrchinBoss ────────────────────────────────────────────────────────────
class UrchinBoss {
    constructor(x){
        this.x=x; this.w=64; this.h=64; this.y=FLOOR_Y-this.h;
        this.vx=80; this.hp=4; this.maxHp=4;
        this.invuln=0; this.spiked=false; this.spikeTimer=0;
        this.dead=false; this.t=0; this.deathTimer=0;
        this.patrolMin=x-240; this.patrolMax=x+240;
    }
    get midX(){ return this.x+this.w/2; }
    get midY(){ return this.y+this.h/2; }
    update(dt){
        if(this.dead){ this.deathTimer+=dt; return; }
        this.t+=dt;
        if(this.invuln>0) this.invuln-=dt;
        this.spikeTimer+=dt;
        if(!this.spiked&&this.spikeTimer>2){ this.spiked=true; this.spikeTimer=0; }
        if(this.spiked&&this.spikeTimer>1.5){ this.spiked=false; this.spikeTimer=0; }
        const spd=80+(this.maxHp-this.hp)*22;
        this.x+=(this.vx>0?spd:-spd)*dt;
        if(this.x<this.patrolMin){ this.x=this.patrolMin; this.vx=1; }
        if(this.x+this.w>this.patrolMax){ this.x=this.patrolMax-this.w; this.vx=-1; }
        if(!player||player.invuln>0||this.invuln>0) return;
        const hit=player.x<this.x+this.w&&player.x+player.w>this.x&&player.y<this.y+this.h&&player.y+player.h>this.y;
        if(!hit) return;
        if(player.vy>0&&player.y+player.h<this.y+this.h*0.55&&!this.spiked){
            this.hp--;
            player.vy=-500; this.invuln=0.9; this.spiked=true; this.spikeTimer=0;
            spawnParticles(this.midX,this.midY,'#ff6600',14);
            playSfx(180,'sawtooth',0.2,0.12,-80);
            if(this.hp<=0){
                bossDefeated=true; this.dead=true;
                [262,330,392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSfx(f,'square',0.15,0.08),i*80));
                for(let i=0;i<5;i++) setTimeout(()=>spawnParticles(this.midX,FLOOR_Y-40,'#ff8800',10),i*120);
            }
        } else { player.die(); }
    }
    draw(ctx){
        if(this.dead&&this.deathTimer>1.5) return;
        const cx=Math.floor(this.x+this.w/2), cy=Math.floor(this.y+this.h/2);
        ctx.save();
        if(this.dead) ctx.globalAlpha=Math.max(0,1-this.deathTimer);
        if(this.invuln>0&&Math.floor(Date.now()/60)%2===0){ ctx.restore(); return; }
        // Shadow
        ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(cx,FLOOR_Y+4,36,8,0,0,Math.PI*2); ctx.fill();
        // Spikes
        const spikeLen=this.spiked?26:8;
        ctx.strokeStyle=this.spiked?'#ff3300':'#552200'; ctx.lineWidth=3;
        for(let i=0;i<16;i++){
            const a=i*Math.PI*2/16+this.t*0.4;
            ctx.beginPath(); ctx.moveTo(cx+Math.cos(a)*28,cy+Math.sin(a)*28);
            ctx.lineTo(cx+Math.cos(a)*(28+spikeLen),cy+Math.sin(a)*(28+spikeLen)); ctx.stroke();
        }
        // Body
        const bc=this.spiked?'#330000':(this.invuln>0?'#883300':'#551100');
        ctx.fillStyle=bc; ctx.beginPath(); ctx.arc(cx,cy,28,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,80,0,0.25)'; ctx.beginPath(); ctx.arc(cx-8,cy-8,14,0,Math.PI*2); ctx.fill();
        // Eyes
        ctx.fillStyle='#ff0000'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=10;
        ctx.beginPath(); ctx.arc(cx-9,cy-4,6,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+9,cy-4,6,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
        ctx.fillStyle='#000';
        ctx.beginPath(); ctx.arc(cx-9,cy-4,3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+9,cy-4,3,0,Math.PI*2); ctx.fill();
        // Mouth
        ctx.strokeStyle='#ff4400'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(cx,cy+4,8,0.1,Math.PI-0.1); ctx.stroke();
        // HP bar
        if(!this.dead){
            const bw=80,bh=9,bx=cx-40,by=this.y-22;
            ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
            ctx.fillStyle='#660000'; ctx.fillRect(bx,by,bw,bh);
            ctx.fillStyle='#ff3300'; ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
            ctx.fillStyle='#fff'; ctx.font='bold 9px monospace'; ctx.textAlign='center';
            ctx.fillText('URCHIN',cx,by-3);
            // Hint when vulnerable
            if(!this.spiked&&this.invuln<=0){
                ctx.fillStyle='rgba(255,255,0,0.9)'; ctx.font='bold 10px monospace';
                ctx.fillText('▼ STOMP! ▼',cx,by-14);
            }
        }
        ctx.restore();
    }
}

        this.opening=false; this.openY=0; this.dead=false;
    }

        if(bossDefeated&&!this.opening){
            this.opening=true;

            [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSfx(f,'sine',0.15,0.1),i*100));
        }

            this.openY+=dt*220;
            if(this.openY>=this.h) this.dead=true;
            return;
        }
        if(!player) return;
        const visH=this.h-this.openY;
        if(player.x+player.w>this.x&&player.x<this.x+this.w&&player.y+player.h>0&&player.y<visH){
            player.x=this.x-player.w; player.vx=Math.min(player.vx,-80);
        }

    draw(ctx){
        if(this.dead) return;
        const gateY=this.openY, gateH=this.h-this.openY;
        ctx.save();
        // Frame
        ctx.fillStyle='#665544'; ctx.fillRect(this.x-8,gateY,8,gateH);
        ctx.fillRect(this.x+this.w,gateY,8,gateH);
        // Vertical bars
        for(let bx=this.x;bx<this.x+this.w;bx+=9){
            const bg=ctx.createLinearGradient(bx,0,bx+6,0);

            ctx.fillStyle=bg; ctx.fillRect(bx,gateY,6,gateH);

        // Horizontal bars
        ctx.fillStyle='#bbb';
        for(let by=gateY;by<gateY+gateH;by+=36) ctx.fillRect(this.x-8,by,this.w+16,7);
        // Spikes at bottom
        ctx.fillStyle='#999';
        for(let bx=this.x;bx<this.x+this.w;bx+=9){
            ctx.beginPath(); ctx.moveTo(bx,gateY+gateH); ctx.lineTo(bx+3,gateY+gateH+14); ctx.lineTo(bx+6,gateY+gateH); ctx.fill();
        }
        ctx.restore();
    }
}

class FireFlower {

// ── Fireball projectile ───────────────────────────────────────────────────
class Fireball {
    constructor(x,y,dir){ this.x=x; this.y=y; this.w=10; this.h=10; this.vx=dir*420; this.vy=-160; this.dead=false; this.t=0; this.bounces=0; }
    get midX(){ return this.x+this.w/2; }
    get midY(){ return this.y+this.h/2; }
    update(dt){
        if(this.dead) return;
        this.t+=dt;
        if(this.t>3){ this.dead=true; return; }
        this.vy+=GRAVITY*dt;
        this.x+=this.vx*dt; this.y+=this.vy*dt;
        // Bounce off floor
        if(this.y+this.h>=FLOOR_Y){
            this.y=FLOOR_Y-this.h; this.vy=-Math.abs(this.vy)*0.65;
            this.bounces++;
            if(this.bounces>4) this.dead=true;
        }
        // Off-screen
        if(this.x<0||this.x>WW) this.dead=true;
        if(!player) return;
        // Hit enemies
        entities.forEach(e=>{
            if(e.dead) return;
            if(e instanceof Goomba||e instanceof KoopaTroopa||e instanceof Clown){
                const hit=this.x<e.x+e.w&&this.x+this.w>e.x&&this.y<e.y+e.h&&this.y+this.h>e.y;
                if(hit){ e.dead=true; this.dead=true; score+=200; spawnParticles(e.midX,e.midY,'#ff6600',8); playSfx(250,'square',0.1,0.08,-50); }
            }
            if(e instanceof UrchinBoss && !e.dead && !e.spiked && e.invuln<=0){
                const hit=this.x<e.x+e.w&&this.x+this.w>e.x&&this.y<e.y+e.h&&this.y+this.h>e.y;
                if(hit){
                    this.dead=true; e.hp--; e.invuln=0.9; e.spiked=true; e.spikeTimer=0;
                    spawnParticles(e.midX,e.midY,'#ff6600',10); playSfx(180,'sawtooth',0.18,0.1,-80);
                    if(e.hp<=0){
                        bossDefeated=true; e.dead=true;
                        [262,330,392,523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSfx(f,'square',0.15,0.08),i*80));
                        for(let i=0;i<5;i++) setTimeout(()=>spawnParticles(e.midX,FLOOR_Y-40,'#ff8800',10),i*120);
                    }
                }
            }
        });
    }
    draw(ctx){
        if(this.dead) return;
        ctx.save();
        ctx.shadowColor='#ff4400'; ctx.shadowBlur=12;
        const pulse=0.7+0.3*Math.sin(this.t*20);
        ctx.fillStyle=`rgba(255,${Math.floor(100+100*pulse)},0,${pulse})`;
        ctx.beginPath(); ctx.arc(this.midX,this.midY,5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,0,0.8)';
        ctx.beginPath(); ctx.arc(this.midX,this.midY,2.5,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.restore();
    }
}

// ── CheckpointFlag ────────────────────────────────────────────────────────
class CheckpointFlag {

        }

    draw(ctx){
        // Pole
        ctx.fillStyle='#aaa'; ctx.fillRect(this.x+8,this.y,4,this.h);
        ctx.fillStyle='#ddd'; ctx.fillRect(this.x+9,this.y,2,this.h);
        // Flag
        const fc=this.captured?'#00cc55':'#888888';
        ctx.fillStyle=fc;
        ctx.beginPath();
        ctx.moveTo(this.x+12,this.y+8); ctx.lineTo(this.x+12,this.y+42); ctx.lineTo(this.x+46,this.y+24);
        ctx.closePath(); ctx.fill();
        if(!this.captured){
            ctx.fillStyle='rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.moveTo(this.x+12,this.y+14); ctx.lineTo(this.x+12,this.y+35); ctx.lineTo(this.x+34,this.y+24);
            ctx.closePath(); ctx.fill();
        }
        // Gold ball on top
        ctx.fillStyle=this.captured?'#00ff88':'#999';
        ctx.shadowColor=this.captured?'#00ff88':'transparent'; ctx.shadowBlur=this.captured?10:0;
        ctx.beginPath(); ctx.arc(this.x+10,this.y,6,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;

// ── Helpers ──────────────────────────────────────────────────────────────
function rectHit(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }
function spawnParticles(x,y,color,n){
    for(let i=0;i<n;i++){
        const a=Math.random()*Math.PI*2, s=Math.random()*110+50;
        particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,color,age:0,life:0.5+Math.random()*0.3,r:2+Math.random()*4});
    }
}
function drawStarShape(ctx,cx,cy,pts,ro,ri,fill){
    let rot=-Math.PI/2,step=Math.PI/pts; ctx.beginPath();
    for(let i=0;i<pts;i++){ctx.lineTo(cx+Math.cos(rot)*ro,cy+Math.sin(rot)*ro);rot+=step;ctx.lineTo(cx+Math.cos(rot)*ri,cy+Math.sin(rot)*ri);rot+=step;}
    ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
}

// ── Level ────────────────────────────────────────────────────────────────
function initLevel(){ resetLevel(); }

function resetLevel(){
    const fy = FLOOR_Y - 18;
    const DH1 = Math.floor(DOWNHILL_X1 / TILE); // 40
    const DH2 = Math.ceil(DOWNHILL_X2 / TILE);  // 55
    const MIN_GAP = 9; // minimum tiles between any two lethal obstacles

    // Trapeze centers known upfront so obstacles can avoid them
    const TRAPEZE_CENTERS = (LEVEL.mode==='circus') ? [18,36,56,76] : [];

    // ── Pick lethal obstacle columns with guaranteed spacing ─────────────
    // Two safe ranges: pre-downhill and post-downhill, both with a buffer
    // Circus uses a single range, keeping clear of start (col<10) and end (col>96)
    const ranges = (LEVEL.mode==='circus'||LEVEL.mode==='castle') ? [[10, 78]] : [[6, DH1 - 3], [DH2 + 3, 104]];
    function pickCols(count, gap) {
        const cols = [];
        for (let t = 0; t < 3000 && cols.length < count; t++) {
            const r = ranges[Math.floor(Math.random() * ranges.length)];
            const c = r[0] + Math.floor(Math.random() * (r[1] - r[0] + 1));
            if (STOP_COL > 0 && Math.abs(c - STOP_COL) < 8) continue;
            if (TRAPEZE_CENTERS.some(tc => Math.abs(c - tc) < 7)) continue; // keep trapeze zones clear
            if (cols.every(x => Math.abs(x - c) >= gap)) cols.push(c);
        }
        return cols.sort((a, b) => a - b);
    }
    const numLethal = 8 + Math.floor(Math.random() * 4); // 8–11 lethal spots
    const lethalCols = pickCols(numLethal, MIN_GAP);

    // ── Assign types to each lethal column ───────────────────────────────
    const typePool = [
        ...Array(LEVEL.numRocks).fill('rock'),
        ...Array(LEVEL.numHoles).fill('hole'),
        ...Array(LEVEL.numPits).fill('pit'),
        ...Array(LEVEL.numPotholes).fill('pothole'),
    ];
    const newPitCols = new Set(), newPotholeCols = new Set();
    const rockXs = [], holeXs = [];
    lethalCols.forEach(col => {
        const t = typePool[Math.floor(Math.random() * typePool.length)];
        if      (t === 'rock')    rockXs.push(col * TILE);
        else if (t === 'hole')    holeXs.push(col * TILE);
        else if (t === 'pit')   { newPitCols.add(col); newPitCols.add(col + 1); }
        else                    newPotholeCols.add(col);
    });

    // Update global hole sets used by drawRoad
    WIDE_PITS    = newPitCols;
    POTHOLE_COLS = newPotholeCols;
    ALL_HOLES    = new Set([...WIDE_PITS, ...POTHOLE_COLS]);

    // ── Circus: add trapeze pits before rebuilding floor ──────────────────
    if(LEVEL.mode === 'circus'){
        TRAPEZE_CENTERS.forEach(c=>{ for(let i=-2;i<=2;i++) WIDE_PITS.add(c+i); });
        ALL_HOLES = new Set([...WIDE_PITS, ...POTHOLE_COLS]);
    }

    // ── Rebuild floor tiles ───────────────────────────────────────────────
    levelTiles = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    for (let c = 0; c < COLS; c++) { if (!ALL_HOLES.has(c)) levelTiles[FLOOR_ROW][c] = 1; }
    for (let r = 0; r < ROWS; r++) { levelTiles[r][0] = 1; levelTiles[r][COLS-1] = 1; }

    // ── Snakes (stompable, avoid downhill and obstacle clusters) ─────────
    const [snakeMin, snakeExtra] = LEVEL.numSnakes || [0, 0];
    const numSnakes = snakeMin + Math.floor(Math.random() * snakeExtra);
    const snakeXs = [];
    for (let t = 0; t < 2000 && snakeXs.length < numSnakes; t++) {
        const x = 180 + Math.floor(Math.random() * (WIN_X - 500));
        const col = Math.floor(x / TILE);
        if (col >= DH1 && col <= DH2) continue;
        if (STOP_COL > 0 && Math.abs(col - STOP_COL) < 8) continue;
        if (lethalCols.some(c => Math.abs(c - col) < 3)) continue;
        if (snakeXs.every(sx => Math.abs(sx - x) > 230)) snakeXs.push(x);
    }

    // ── Puddles (non-lethal, 2–4) ─────────────────────────────────────────
    const numPuddles = 2 + Math.floor(Math.random() * 3);
    const puddleXs = [];
    for (let t = 0; t < 500 && puddleXs.length < numPuddles; t++) {
        const col = 8 + Math.floor(Math.random() * 98);
        if (col >= DH1 && col <= DH2) continue;
        if (STOP_COL > 0 && Math.abs(col - STOP_COL) < 8) continue;
        if (lethalCols.some(c => Math.abs(c - col) < 3)) continue;
        if (puddleXs.every(px => Math.abs(px - col * TILE) > 500)) puddleXs.push(col * TILE);
    }

    // ── Ground bells (~20% chance per col, skip obstacle neighbours) ─────
    const groundBells = [];
    for (let col = 3; col < 110; col++) {
        if (Math.random() < LEVEL.groundCollectChance && !lethalCols.some(c => Math.abs(c - col) < 2) && !ALL_HOLES.has(col))
            groundBells.push(col);
    }

    // ── Floating bells (random stride 5–8 cols) ───────────────────────────
    const floatBells = [];
    const [strideMin, strideRand] = LEVEL.floatCollectStride;
    for (let col = 8; col < 108; col += strideMin + Math.floor(Math.random() * strideRand)) floatBells.push(col);

    // ── Assemble ──────────────────────────────────────────────────────────
    if(LEVEL.mode === 'underwater'){
        // Reset per-run state so letters/star don't carry over across deaths
        lettersCollected.clear();
        starSpawned = false;
        // Underwater: letters placed at fixed positions, jellyfish enemies, rocks
        player = new Mario(80, FLOOR_Y - 240);
        player.starPower = false;
        const letterYs = [FLOOR_Y-300, FLOOR_Y-180, FLOOR_Y-120, FLOOR_Y-240];
        const letterXs = [600, 1400, 2200];  // O at 600, N at 1400, E at 2200
        const letterEntities = LEVEL.letters.map((l,i) => new Letter(letterXs[i], letterYs[i%4], l));
        const [jMin, jExtra] = LEVEL.numJellyfish;
        const numJelly = jMin + Math.floor(Math.random()*jExtra);
        const jellyfish = [];
        for(let i=0;i<numJelly;i++){
            const jx = 400 + Math.random()*(WW-800);
            const jy = 80 + Math.random()*(FLOOR_Y-200);
            jellyfish.push(new Jellyfish(jx, jy));
        }
        const uwRocks = rockXs.map(x => new Rock(x));

        // ── Coral wall pairs: top stalactite + bottom coral with a swim gap ──
        const gapH = 140;        // gap Mario swims through
        const waterTop = 55;
        const waterBot = FLOOR_Y - 15;
        // Zones to avoid: start, each letter, star, end
        const clearZones = [[0,380],[WIN_X-200,WIN_X+200],
            ...letterXs.map(x=>[x-130,x+130]),
            [LEVEL.starX-130,LEVEL.starX+130]];
        const walls = [];
        let wx = 420;
        while(wx < WW - 300){
            wx += 220 + Math.floor(Math.random()*200);
            if(clearZones.some(([a,b])=>wx>=a&&wx<=b)) continue;
            // Random gap centre in the water column
            const gapCy = waterTop + gapH/2 + 40 + Math.random()*(waterBot-waterTop-gapH-80);
            const gapTop = gapCy - gapH/2;
            const gapBot = gapCy + gapH/2;
            // Bottom coral (floor → gapBot)
            const floorH = waterBot - gapBot;
            if(floorH > 30) walls.push(new CoralWall(wx, gapBot, floorH, true));
            // Top stalactite (waterTop → gapTop)
            const ceilH = gapTop - waterTop;
            if(ceilH > 30) walls.push(new CoralWall(wx, waterTop, ceilH, false));
        }

        entities = [...letterEntities, ...jellyfish, ...uwRocks, ...walls];
    } else if(LEVEL.mode === 'circus'){
        player = new Mario(80, FLOOR_Y - 30);
        const trapezes = TRAPEZE_CENTERS.map((c,i)=>new Trapeze(c*TILE+TILE/2, FLOOR_Y-265, 150, i*Math.PI/2));
        const [cMin,cExtra]=LEVEL.numClowns||[4,3];
        const numClowns=cMin+Math.floor(Math.random()*cExtra);
        const clownXs=[];
        for(let ci=0;ci<1500&&clownXs.length<numClowns;ci++){
            const x=200+Math.floor(Math.random()*(WIN_X-500));
            const col=Math.floor(x/TILE);
            if(x > WIN_X - 900) continue; // keep end area clear
            if(WIDE_PITS.has(col)||WIDE_PITS.has(col-1)||WIDE_PITS.has(col+1)) continue;
            if(TRAPEZE_CENTERS.some(tc=>Math.abs(col-tc)<7)) continue; // keep trapeze zones clear
            if(lethalCols.some(c=>Math.abs(c-col)<3)) continue;
            if(clownXs.every(cx=>Math.abs(cx-x)>180)) clownXs.push(x);
        }
        const circusStars=[];
        for(let col=5;col<108;col+=3+Math.floor(Math.random()*3)){
            if(ALL_HOLES.has(col)) continue;
            if(Math.random()<0.4) circusStars.push(new CircusStar(col*TILE+6, FLOOR_Y-68));
            if(Math.random()<0.18) circusStars.push(new CircusStar(col*TILE+6, FLOOR_Y-148));
        }
        entities=[
            ...trapezes,
            ...clownXs.map(x=>new Clown(x,FLOOR_Y-38)),
            ...rockXs.map(x=>new Rock(x)),
            ...holeXs.map(x=>new BlackHole(x)),
            ...circusStars,
        ];
    } else if(LEVEL.mode === 'castle'){
        bossDefeated = false;
        const spawnX = checkpointX !== null ? checkpointX : 80;
        player = new Mario(spawnX, FLOOR_Y - 30);
        const [gMin,gExtra]=LEVEL.numGoombas||[5,3];
        const numGoombas=gMin+Math.floor(Math.random()*gExtra);
        const goombaXs=[];
        for(let i=0;i<2000&&goombaXs.length<numGoombas;i++){
            const x=200+Math.floor(Math.random()*(LEVEL.bossX-400));
            const col=Math.floor(x/TILE);
            if(ALL_HOLES.has(col)) continue;
            if(lethalCols.some(c=>Math.abs(c-col)<3)) continue;
            if(goombaXs.every(gx=>Math.abs(gx-x)>180)) goombaXs.push(x);
        }
        const [kMin,kExtra]=LEVEL.numKoopas||[4,2];
        const numKoopas=kMin+Math.floor(Math.random()*kExtra);
        const koopaXs=[];
        for(let i=0;i<2000&&koopaXs.length<numKoopas;i++){
            const x=300+Math.floor(Math.random()*(LEVEL.bossX-500));
            const col=Math.floor(x/TILE);
            if(ALL_HOLES.has(col)) continue;
            if(lethalCols.some(c=>Math.abs(c-col)<3)) continue;
            if([...goombaXs,...koopaXs].every(ex=>Math.abs(ex-x)>150)) koopaXs.push(x);
        }
        const coins=[];
        for(let col=5;col<97;col+=2+Math.floor(Math.random()*3)){
            if(ALL_HOLES.has(col)) continue;
            if(Math.random()<0.22) coins.push(new Coin(col*TILE+8, FLOOR_Y-52));
            if(Math.random()<0.10) coins.push(new Coin(col*TILE+8, FLOOR_Y-116));
        }
        entities=[
            ...goombaXs.map(x=>new Goomba(x,FLOOR_Y-26)),
            ...koopaXs.map(x=>new KoopaTroopa(x,FLOOR_Y-36)),
            ...rockXs.map(x=>new Rock(x)),
            ...coins,
            new Mushroom(420),
            new Mushroom(1180),
            new FireFlower(1820),
            new FireFlower(2200),
            new CheckpointFlag(2450),
            new UrchinBoss(LEVEL.bossX),
            new BossGate(LEVEL.bossGateX),
        ];
    } else {
        player = new Mario(80, FLOOR_Y - 30);
        entities = [
            ...snakeXs.map(x => new Snake(x, fy)),
            ...rockXs.map(x => new Rock(x)),
            ...holeXs.map(x => new BlackHole(x)),
            ...(STOP_COL > 0 ? [new StopSign(STOP_COL * TILE)] : []),
            ...puddleXs.map(x => new Puddle(x)),
            ...groundBells.map(c => new Bell(c * TILE, FLOOR_Y - 48)),
            ...floatBells.map(c => new Bell(c * TILE, FLOOR_Y - 130)),
        ];
    }
    particles = []; gameState = STATE.PLAYING; playBgm();
}

function startGame(){
    score=0; collectCount=0;
    lettersCollected.clear();
    starSpawned=false;
    bossDefeated=false;
    checkpointX=null;
    if(player) player.starPower=false;
    initLevel();
}

// ── Game Loop ────────────────────────────────────────────────────────────
let lastTime=0;
requestAnimationFrame(function loop(ts){
    let dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
    if(gameState===STATE.PLAYING||gameState===STATE.DYING){
        if(player) player.update(dt);
        entities.forEach(e=>e.update&&e.update(dt));
        entities=entities.filter(e=>!e.dead);
        particles.forEach(p=>{p.age+=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=400*dt;});
        particles=particles.filter(p=>p.age<p.life);
        camera.x+=(player.x-300-camera.x)*8*dt;
        camera.x=Math.max(0,Math.min(camera.x,WW-800));
        const t=Math.max(0,Math.min(1,(player.x-DOWNHILL_X1)/(DOWNHILL_X2-DOWNHILL_X1)));
        downhillIntensity=player.x>DOWNHILL_X1&&player.x<DOWNHILL_X2?t:0;
    }
    render();
    requestAnimationFrame(loop);
});

// ── Scene ────────────────────────────────────────────────────────────────
function drawSky(){
    // Sky darkens slightly on downhill
    const di=downhillIntensity;
    const g=ctx.createLinearGradient(0,0,0,FLOOR_Y);
    g.addColorStop(0,LEVEL.skyTop);
    g.addColorStop(0.6,LEVEL.skyMid);
    g.addColorStop(1,LEVEL.skyBot);
    ctx.fillStyle=g; ctx.fillRect(0,0,WW,FLOOR_Y);
}

function drawValleyTerrain(){
    // Two large hill mounds flanking the downhill zone — valley is open in between
    const peakH = 290;  // how far above road the hill peaks

    // ── Left hill mound (sloping down to the right into the valley) ──────
    // Back shadow layer
    ctx.fillStyle = LEVEL.hillShadow;
    ctx.beginPath();
    ctx.moveTo(0, FLOOR_Y);
    ctx.lineTo(0, FLOOR_Y - peakH - 30);
    ctx.bezierCurveTo(
        DOWNHILL_X1 - 200, FLOOR_Y - peakH - 30,
        DOWNHILL_X1 - 80, FLOOR_Y - peakH * 0.6,
        DOWNHILL_X1 - 40, FLOOR_Y - peakH * 0.2
    );
    ctx.bezierCurveTo(DOWNHILL_X1 - 10, FLOOR_Y - 20, DOWNHILL_X1, FLOOR_Y, DOWNHILL_X1, FLOOR_Y);
    ctx.closePath();
    ctx.fill();
    // Front grass layer
    ctx.fillStyle = LEVEL.hillColor;
    ctx.beginPath();
    ctx.moveTo(0, FLOOR_Y);
    ctx.lineTo(0, FLOOR_Y - peakH);
    ctx.bezierCurveTo(
        DOWNHILL_X1 - 180, FLOOR_Y - peakH,
        DOWNHILL_X1 - 60, FLOOR_Y - peakH * 0.5,
        DOWNHILL_X1 - 20, FLOOR_Y - peakH * 0.12
    );
    ctx.bezierCurveTo(DOWNHILL_X1 - 5, FLOOR_Y - 8, DOWNHILL_X1, FLOOR_Y, DOWNHILL_X1, FLOOR_Y);
    ctx.closePath();
    ctx.fill();
    // Bright grass edge
    ctx.strokeStyle = LEVEL.hillEdge; ctx.lineWidth = 6; ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(0, FLOOR_Y - peakH);
    ctx.bezierCurveTo(
        DOWNHILL_X1 - 180, FLOOR_Y - peakH,
        DOWNHILL_X1 - 60, FLOOR_Y - peakH * 0.5,
        DOWNHILL_X1 - 20, FLOOR_Y - peakH * 0.12
    );
    ctx.stroke();

    // ── Right hill mound (sloping up to the right out of the valley) ─────
    ctx.fillStyle = LEVEL.hillShadow;
    ctx.beginPath();
    ctx.moveTo(DOWNHILL_X2, FLOOR_Y);
    ctx.bezierCurveTo(DOWNHILL_X2, FLOOR_Y, DOWNHILL_X2 + 10, FLOOR_Y - 20, DOWNHILL_X2 + 40, FLOOR_Y - peakH * 0.2);
    ctx.bezierCurveTo(DOWNHILL_X2 + 80, FLOOR_Y - peakH * 0.6, DOWNHILL_X2 + 200, FLOOR_Y - peakH - 30, WW, FLOOR_Y - peakH - 30);
    ctx.lineTo(WW, FLOOR_Y);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = LEVEL.hillColor;
    ctx.beginPath();
    ctx.moveTo(DOWNHILL_X2, FLOOR_Y);
    ctx.bezierCurveTo(DOWNHILL_X2, FLOOR_Y, DOWNHILL_X2 + 5, FLOOR_Y - 8, DOWNHILL_X2 + 20, FLOOR_Y - peakH * 0.12);
    ctx.bezierCurveTo(DOWNHILL_X2 + 60, FLOOR_Y - peakH * 0.5, DOWNHILL_X2 + 180, FLOOR_Y - peakH, WW, FLOOR_Y - peakH);
    ctx.lineTo(WW, FLOOR_Y);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = LEVEL.hillEdge; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(DOWNHILL_X2 + 20, FLOOR_Y - peakH * 0.12);
    ctx.bezierCurveTo(DOWNHILL_X2 + 60, FLOOR_Y - peakH * 0.5, DOWNHILL_X2 + 180, FLOOR_Y - peakH, WW, FLOOR_Y - peakH);
    ctx.stroke();
}

}
function drawRoad(){
    ctx.fillStyle=LEVEL.roadColor; ctx.fillRect(0,FLOOR_Y,WW,TILE);
    // Downhill tint
    if(downhillIntensity>0){
        ctx.fillStyle=`rgba(40,20,10,${downhillIntensity*0.25})`;
        ctx.fillRect(DOWNHILL_X1,FLOOR_Y,DOWNHILL_X2-DOWNHILL_X1,TILE);
    }
    // Center lane dashes
    ctx.fillStyle='#ffee00';
    for(let x=0;x<WW;x+=88) ctx.fillRect(x+4,FLOOR_Y+13,50,5);
    // Edge lines
    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.fillRect(0,FLOOR_Y,WW,3); ctx.fillRect(0,FLOOR_Y+28,WW,3);
    // Wide pits
    WIDE_PITS.forEach(c=>{
        ctx.fillStyle='#090909'; ctx.fillRect(c*TILE,FLOOR_Y,TILE,TILE);
        ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(c*TILE,FLOOR_Y,TILE,7);
    });
    // Potholes (cracked single-tile holes)
    POTHOLE_COLS.forEach(c=>{
        const px=c*TILE, py=FLOOR_Y;
        // Dark hole
        ctx.fillStyle='#111'; ctx.beginPath(); ctx.ellipse(px+16,py+14,13,9,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(px+16,py+14,9,6,0,0,Math.PI*2); ctx.fill();
        // Cracks radiating out
        ctx.strokeStyle='#555'; ctx.lineWidth=1.5;
        [[16,py,12,py+6],[px+4,py+10,px+12,py+18],[px+28,py+10,px+22,py+18],[px+6,py+22,px+14,py+16]].forEach(([x1,y1,x2,y2])=>{
            ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
        });
        // Warning triangle above pothole
        ctx.fillStyle='#ff4'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
        ctx.shadowColor='#f80'; ctx.shadowBlur=4; ctx.fillText('\u26a0',px+16,py-4); ctx.shadowBlur=0;
    });
}

function drawUnderwaterBg(){
    // Deep water gradient
    const g=ctx.createLinearGradient(0,0,0,WH);
    g.addColorStop(0,LEVEL.skyTop);
    g.addColorStop(0.5,LEVEL.skyMid);
    g.addColorStop(1,LEVEL.skyBot);
    ctx.fillStyle=g; ctx.fillRect(0,0,WW,WH);
    // Light rays from surface
    ctx.save(); ctx.globalAlpha=0.04;
    const t=Date.now()*0.0004;
    for(let i=0;i<8;i++){
        const rx=i*500+Math.sin(t+i)*80;
        ctx.fillStyle='#aaddff';
        ctx.beginPath(); ctx.moveTo(rx,0); ctx.lineTo(rx+120,WH); ctx.lineTo(rx+60,WH); ctx.lineTo(rx-60,0); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}
function drawSeabed(){
    // Sandy seabed
    ctx.fillStyle='#1a3a1a'; ctx.fillRect(0,FLOOR_Y,WW,TILE+8);
    ctx.fillStyle='#22441a'; ctx.fillRect(0,FLOOR_Y,WW,6);
    // Seaweed
    const t=Date.now()*0.001;
    [180,420,700,980,1260,1600,1950,2300,2700,3100].forEach((sx,i)=>{
        const sway=Math.sin(t+i)*8;
        ctx.strokeStyle='#1a7a2a'; ctx.lineWidth=4; ctx.lineCap='round';
        for(let seg=0;seg<4;seg++){
            ctx.beginPath();
            ctx.moveTo(sx+sway*seg*0.3, FLOOR_Y-seg*22);
            ctx.lineTo(sx+sway*(seg+1)*0.3, FLOOR_Y-(seg+1)*22);
            ctx.stroke();
        }
        ctx.fillStyle='#2aaa3a';
        ctx.beginPath(); ctx.ellipse(sx+sway*1.2,FLOOR_Y-88,10,6,sway*0.05,0,Math.PI*2); ctx.fill();
    });
    // Corals / rocks on seabed
    [300,750,1100,1500,1850,2400,2900,3300].forEach((cx,i)=>{
        ctx.fillStyle=i%2===0?'#882233':'#334488';
        ctx.beginPath(); ctx.arc(cx,FLOOR_Y-10,14+i%3*4,Math.PI,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+20,FLOOR_Y-8,10,Math.PI,Math.PI*2); ctx.fill();
    });
}

function drawLetterHUD(){
    // Show O N E progress in top-right corner
    if(LEVEL.mode !== 'underwater') return;
    const letters = LEVEL.letters || [];
    ctx.save();
    let hx = 560;
    ctx.font='bold 18px monospace'; ctx.textAlign='center';
    letters.forEach((l,i)=>{
        const collected = lettersCollected.has(l);
        ctx.fillStyle = collected ? '#FFD700' : 'rgba(255,255,255,0.25)';
        ctx.shadowColor = collected ? '#FFD700' : 'none';
        ctx.shadowBlur = collected ? 8 : 0;
        ctx.fillText(l, hx+i*28, 28);
    });
    ctx.shadowBlur=0;
    // Star unlock indicator
    if(starSpawned && !player?.starPower){
        if(Math.floor(Date.now()/400)%2===0){
            ctx.fillStyle='#FFD700'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
            ctx.shadowColor='#FFD700'; ctx.shadowBlur=10;
            ctx.fillText('⭐ STAR UNLOCKED! ⭐', 400, 60);
            ctx.shadowBlur=0;
        }
    }
    if(player && !player.starPower && player.x > WIN_X - 500){
        if(Math.floor(Date.now()/400)%2===0){
            ctx.fillStyle='#ff4444'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
            ctx.shadowColor='#ff0000'; ctx.shadowBlur=10;
            ctx.fillText('⭐ You need the star to enter! ⭐', 400, 60);
            ctx.shadowBlur=0;
        }
    }
    if(player?.starPower){
        ctx.fillStyle='#FFD700'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
        ctx.shadowColor='#FFD700'; ctx.shadowBlur=10;
        ctx.fillText('⭐ STAR POWER! REACH THE FLAG! ⭐', 400, 60);
        ctx.shadowBlur=0;
    }
    ctx.restore();
}
function drawMarioSwimming(p){
    if(p.invuln>0 && Math.floor(Date.now()/80)%2===0) return;
    ctx.save();
    const cx = Math.floor(p.x+p.w/2), cy = Math.floor(p.y+p.h/2);
    ctx.translate(cx,cy);
    if(p.facing===-1) ctx.scale(-1,1);
    const t=Date.now()*0.003;
    const kick=Math.sin(t*3)*8; // leg kick

    // Star aura
    if(p.starPower){
        ctx.save();
        for(let i=0;i<8;i++){
            const a=i*Math.PI/4+t;
            ctx.fillStyle=`rgba(255,215,0,${0.4+0.3*Math.sin(t*4+i)})`;
            ctx.beginPath(); ctx.arc(Math.cos(a)*20, Math.sin(a)*14, 5, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }

    // Body (horizontal swim pose)
    ctx.fillStyle='#1a3fcc'; ctx.fillRect(-12,-6,24,12); // torso
    ctx.fillStyle='#cc2200'; ctx.fillRect(-12,-6,6,12);  // left arm sleeve
    ctx.fillStyle='#f5c499'; ctx.fillRect(-18,-4,8,8);   // left hand stretched forward
    // Legs kicking
    ctx.fillStyle='#1a3fcc'; ctx.fillRect(4,0,8,6+kick*0.3);
    ctx.fillStyle='#1a3fcc'; ctx.fillRect(4,-8,8,6-kick*0.3);
    ctx.fillStyle='#3d1c02'; ctx.fillRect(4,5+kick*0.3,8,4);
    ctx.fillStyle='#3d1c02'; ctx.fillRect(4,-10-kick*0.3,8,4);
    // Head
    ctx.fillStyle='#f5c499'; ctx.fillRect(-8,-16,14,12);
    ctx.fillStyle='#cc2200'; ctx.fillRect(-10,-20,16,6);
    ctx.fillStyle='#1a0800'; ctx.fillRect(-2,-14,5,3);  // 'stache
    // Goggles
    ctx.fillStyle='rgba(100,200,255,0.6)'; ctx.fillRect(-6,-14,5,4); ctx.fillRect(1,-14,5,4);
    ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.strokeRect(-6,-14,5,4); ctx.strokeRect(1,-14,5,4);
    ctx.restore();
}

function drawCircusBg(){
    const g=ctx.createLinearGradient(0,0,0,WH);
    g.addColorStop(0,'#1a001a'); g.addColorStop(0.5,'#2d0044'); g.addColorStop(1,'#160010');
    ctx.fillStyle=g; ctx.fillRect(0,0,WW,WH);
    // Tent stripe bands
    for(let x=0;x<WW;x+=120){
        ctx.fillStyle='rgba(200,0,30,0.28)'; ctx.fillRect(x,0,60,WH*0.55);
    }
    // Animated spotlights
    const t=Date.now()*0.0006;
    [400,1000,1800,2600,3200].forEach((sx,i)=>{
        const sw=sx+Math.sin(t+i*1.4)*200;
        ctx.save();
        const sg=ctx.createRadialGradient(sw,90,0,sw,90+300,320);
        sg.addColorStop(0,'rgba(255,250,180,0.14)'); sg.addColorStop(1,'rgba(255,250,180,0)');
        ctx.fillStyle=sg;
        ctx.beginPath(); ctx.moveTo(sw,90); ctx.lineTo(sw-180,460); ctx.lineTo(sw+180,460); ctx.closePath(); ctx.fill();
        ctx.restore();
    });
}
function drawBunting(){
    const colors=['#ff0000','#ffdd00','#0055dd','#00aa00','#ff8800','#ff00bb'];
    const t=Date.now()*0.0008;
    for(let x=0;x<WW;x+=80){
        const sagy=Math.sin(x*0.008+t)*5;
        ctx.fillStyle=colors[Math.floor(x/80)%colors.length];
        ctx.beginPath();
        ctx.moveTo(x+20,140+sagy); ctx.lineTo(x+50,140+sagy); ctx.lineTo(x+35,162+sagy); ctx.closePath(); ctx.fill();
    }
    ctx.strokeStyle='rgba(100,60,20,0.45)'; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let x=0;x<=WW;x+=16){
        const sagy=Math.sin(x*0.008+t)*5;
        x===0?ctx.moveTo(x,140+sagy):ctx.lineTo(x,140+sagy);
    }
    ctx.stroke();
}

// ── Castle scene drawing ──────────────────────────────────────────────────
function drawCastleBg(){
    const g=ctx.createLinearGradient(0,0,0,WH);
    g.addColorStop(0,'#080006'); g.addColorStop(0.6,'#140008'); g.addColorStop(1,'#200a00');
    ctx.fillStyle=g; ctx.fillRect(0,0,WW,WH);
    // Stone brick wall pattern
    const bw=80,bh=32,m=3;
    ctx.fillStyle='rgba(60,28,12,0.45)';
    for(let row=0;row*bh<WH*0.85;row++){
        const off=(row%2===0)?0:bw/2;
        for(let col=-1;col*bw<WW+bw;col++) ctx.fillRect(col*bw+off+m,row*bh+m,bw-m*2,bh-m*2);
    }
    // Lava glow near floor
    const lg=ctx.createLinearGradient(0,FLOOR_Y-100,0,WH);
    lg.addColorStop(0,'rgba(255,60,0,0)'); lg.addColorStop(1,'rgba(255,60,0,0.12)');
    ctx.fillStyle=lg; ctx.fillRect(0,FLOOR_Y-100,WW,WH);
}
function drawCastleTorches(){
    const t=Date.now()*0.004;
    for(let x=180;x<WW;x+=300){
        const tx=x, ty=FLOOR_Y-190;
        ctx.fillStyle='#665544'; ctx.fillRect(tx-4,ty,8,44);
        ctx.fillStyle='#554433'; ctx.fillRect(tx-8,ty+34,16,8);
        ctx.fillStyle='#8b4513'; ctx.fillRect(tx-3,ty+12,6,30);
        const fl=Math.sin(t*3+x)*4, fr=4+Math.abs(Math.sin(t*2.2+x))*6;
        const fg=ctx.createRadialGradient(tx,ty+10,0,tx,ty+10,fr*2.5);
        fg.addColorStop(0,'rgba(255,255,120,0.95)'); fg.addColorStop(0.35,'rgba(255,110,0,0.75)'); fg.addColorStop(1,'rgba(180,0,0,0)');
        ctx.fillStyle=fg; ctx.beginPath(); ctx.ellipse(tx,ty+10-fl,fr,fr*2.2,0,0,Math.PI*2); ctx.fill();
        ctx.save();
        const glow=ctx.createRadialGradient(tx,ty+10,0,tx,ty+10,90);
        glow.addColorStop(0,'rgba(255,100,0,0.07)'); glow.addColorStop(1,'rgba(255,100,0,0)');
        ctx.fillStyle=glow; ctx.fillRect(tx-90,ty-50,180,180);
        ctx.restore();
    }
}
function drawCastleFloor(){
    ctx.fillStyle='#3a2a18'; ctx.fillRect(0,FLOOR_Y,WW,TILE+12);
    // Brick lines
    ctx.fillStyle='rgba(0,0,0,0.35)';
    for(let x=0;x<WW;x+=64) ctx.fillRect(x,FLOOR_Y,2,TILE);
    for(let y=FLOOR_Y;y<FLOOR_Y+TILE;y+=16) ctx.fillRect(0,y,WW,2);
    // Lava in pits
    const t=Date.now()*0.002;
    WIDE_PITS.forEach(c=>{
        const lx=c*TILE, ly=FLOOR_Y;
        ctx.fillStyle='#aa2200'; ctx.fillRect(lx,ly,TILE,TILE+12);
        const lv=ctx.createLinearGradient(lx,ly,lx,ly+TILE);
        lv.addColorStop(0,'#ff7700'); lv.addColorStop(0.4,'#ff3300'); lv.addColorStop(1,'#881100');
        ctx.fillStyle=lv; ctx.fillRect(lx,ly,TILE,TILE+12);
        ctx.fillStyle=`rgba(255,180,0,${0.5+0.3*Math.sin(t+c*0.7)})`;
        ctx.beginPath(); ctx.ellipse(lx+TILE/2,ly+6,10,5,0,0,Math.PI*2); ctx.fill();
        ctx.shadowColor='#ff4400'; ctx.shadowBlur=18;
        ctx.fillStyle='rgba(255,80,0,0.15)'; ctx.fillRect(lx,ly-20,TILE,20);
        ctx.shadowBlur=0;
    });
}
