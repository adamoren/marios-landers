function drawPrincess(){
    const px=3390, py=FLOOR_Y; // standing on floor
    const t=Date.now()*0.002;
    const wave=Math.sin(t*2)*4; // gentle sway
    ctx.save();
    ctx.translate(px, py);

    // Sparkle aura (only after boss is defeated)
    if(bossDefeated){
        for(let i=0;i<6;i++){
            const a=i*Math.PI/3+t;
            const sr=28+Math.sin(t*3+i)*6;
            ctx.fillStyle=`rgba(255,200,255,${0.3+0.2*Math.sin(t*2+i)})`;
            ctx.beginPath(); ctx.arc(Math.cos(a)*sr,-60+Math.sin(a)*sr*0.5,3,0,Math.PI*2); ctx.fill();
        }
    }

    // Dress (long, pink, layered)
    ctx.fillStyle='#ff88cc';
    ctx.beginPath();
    ctx.moveTo(-18,-10); ctx.lineTo(-28,0); ctx.lineTo(-22,0); ctx.lineTo(-26,0);
    ctx.lineTo(-30,0); ctx.lineTo(30,0); ctx.lineTo(26,0); ctx.lineTo(22,0); ctx.lineTo(28,0);
    ctx.lineTo(18,-10); ctx.closePath();
    // Simple dress shape
    ctx.beginPath();
    ctx.moveTo(-14,-12+wave*0.2); ctx.bezierCurveTo(-26,-4,-32,0,-28,0); ctx.lineTo(28,0);
    ctx.bezierCurveTo(32,0,26,-4,14,-12+wave*0.2); ctx.closePath(); ctx.fill();
    // Dress top layer highlight
    ctx.fillStyle='#ffaadd';
    ctx.beginPath();
    ctx.moveTo(-10,-12+wave*0.2); ctx.bezierCurveTo(-18,-6,-20,0,-14,0); ctx.lineTo(14,0);
    ctx.bezierCurveTo(20,0,18,-6,10,-12+wave*0.2); ctx.closePath(); ctx.fill();
    // Dress bottom ruffle
    ctx.fillStyle='#ee66bb';
    for(let i=-24;i<=24;i+=8){
        ctx.beginPath(); ctx.ellipse(i,0,5,3,0,0,Math.PI*2); ctx.fill();
    }

    // Bodice
    ctx.fillStyle='#dd44aa';
    ctx.fillRect(-8,-30+wave*0.3,16,18);
    // White apron/trim
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillRect(-5,-28+wave*0.3,10,14);

    // Arms — one waving
    ctx.fillStyle='#f5c499';
    // Left arm (down)
    ctx.fillRect(-13,-28+wave*0.3,5,14);
    // Right arm (waving up)
    const waveAng=Math.sin(t*3)*0.5;
    ctx.save();
    ctx.translate(10,-22+wave*0.3);
    ctx.rotate(-0.6+waveAng);
    ctx.fillRect(0,-14,5,14);
    // Hand
    ctx.beginPath(); ctx.arc(2,-15,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // Left hand
    ctx.beginPath(); ctx.arc(-10,-14+wave*0.3,4,0,Math.PI*2); ctx.fill();

    // Neck
    ctx.fillStyle='#f5c499'; ctx.fillRect(-4,-36+wave*0.3,8,8);

    // Head
    ctx.fillStyle='#f5c499';
    ctx.beginPath(); ctx.ellipse(0,-44+wave*0.3,11,13,0,0,Math.PI*2); ctx.fill();

    // Hair (long blonde)
    ctx.fillStyle='#FFD700';
    // Top hair
    ctx.beginPath(); ctx.ellipse(0,-52+wave*0.3,11,8,0,0,Math.PI*2); ctx.fill();
    // Side locks
    ctx.fillStyle='#eec800';
    ctx.beginPath(); ctx.moveTo(-10,-48+wave*0.3); ctx.bezierCurveTo(-16,-40,-18,-25,-14,-18+wave*0.3); ctx.lineTo(-10,-18+wave*0.3); ctx.bezierCurveTo(-12,-26,-10,-38,-8,-46+wave*0.3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(10,-48+wave*0.3); ctx.bezierCurveTo(16,-40,18,-25,14,-18+wave*0.3); ctx.lineTo(10,-18+wave*0.3); ctx.bezierCurveTo(12,-26,10,-38,8,-46+wave*0.3); ctx.closePath(); ctx.fill();

    // Eyes
    ctx.fillStyle='#224';
    ctx.beginPath(); ctx.ellipse(-4,-44+wave*0.3,2,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4,-44+wave*0.3,2,2.5,0,0,Math.PI*2); ctx.fill();
    // Eye shine
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-3.5,-44.5+wave*0.3,0.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4.5,-44.5+wave*0.3,0.8,0,Math.PI*2); ctx.fill();
    // Smile
    ctx.strokeStyle='#cc6699'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.arc(0,-41+wave*0.3,4,0.1,Math.PI-0.1); ctx.stroke();
    // Rosy cheeks
    ctx.fillStyle='rgba(255,100,150,0.35)';
    ctx.beginPath(); ctx.ellipse(-6,-42+wave*0.3,3,2,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6,-42+wave*0.3,3,2,0,0,Math.PI*2); ctx.fill();

    // Crown
    ctx.fillStyle='#FFD700';
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.moveTo(-9,-56+wave*0.3);
    ctx.lineTo(-9,-62+wave*0.3); ctx.lineTo(-4,-58+wave*0.3);
    ctx.lineTo(0,-65+wave*0.3); ctx.lineTo(4,-58+wave*0.3);
    ctx.lineTo(9,-62+wave*0.3); ctx.lineTo(9,-56+wave*0.3);
    ctx.closePath(); ctx.fill();
    // Crown gems
    ctx.shadowBlur=0;
    ctx.fillStyle='#ff44aa'; ctx.beginPath(); ctx.arc(0,-63+wave*0.3,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#44aaff'; ctx.beginPath(); ctx.arc(-7,-59+wave*0.3,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-59+wave*0.3,2,0,Math.PI*2); ctx.fill();

    // "Help me!" / "Thank you!" speech bubble
    if(bossDefeated){
        const bubble='Thank you! ♥';
        ctx.fillStyle='rgba(255,255,255,0.92)';
        ctx.beginPath(); ctx.roundRect(8,-84+wave*0.3,90,22,[8]); ctx.fill();
        ctx.strokeStyle='#ff88cc'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(8,-84+wave*0.3,90,22,[8]); ctx.stroke();
        // Tail
        ctx.fillStyle='rgba(255,255,255,0.92)';
        ctx.beginPath(); ctx.moveTo(10,-62+wave*0.3); ctx.lineTo(18,-62+wave*0.3); ctx.lineTo(14,-56+wave*0.3); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#cc2266'; ctx.font='bold 11px monospace'; ctx.textAlign='left';
        ctx.fillText(bubble, 14,-68+wave*0.3);
    } else {
        const pulse=0.6+0.4*Math.sin(t*3);
        ctx.fillStyle=`rgba(255,255,255,${pulse*0.9})`;
        ctx.beginPath(); ctx.roundRect(10,-84+wave*0.3,76,22,[8]); ctx.fill();
        ctx.strokeStyle='#ff88cc'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(10,-84+wave*0.3,76,22,[8]); ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,0.92)';
        ctx.beginPath(); ctx.moveTo(12,-62+wave*0.3); ctx.lineTo(20,-62+wave*0.3); ctx.lineTo(16,-56+wave*0.3); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#cc2266'; ctx.font='bold 11px monospace'; ctx.textAlign='left';
        ctx.fillText('Save me!', 16,-68+wave*0.3);
    }

    ctx.restore();
}

// ── Render ───────────────────────────────────────────────────────────────
function render(){
    ctx.clearRect(0,0,800,576);

    if(gameState===STATE.TITLE){
        const bg=ctx.createLinearGradient(0,0,0,576);
        bg.addColorStop(0,LEVEL.skyTop); bg.addColorStop(0.7,LEVEL.skyMid); bg.addColorStop(1,LEVEL.skyBot);
        ctx.fillStyle=bg; ctx.fillRect(0,0,800,576);
        if(LEVEL.mode === 'underwater'){
            // Underwater title: bubbles and seabed strip
            ctx.fillStyle='rgba(150,220,255,0.15)';
            [80,220,400,560,680].forEach((bx,i)=>{ ctx.beginPath(); ctx.arc(bx,320+i*20,8+i*3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(bx+30,280+i*15,5+i*2,0,Math.PI*2); ctx.fill(); });
            ctx.fillStyle='#1a3a1a'; ctx.fillRect(0,420,800,60);
            ctx.fillStyle='#22441a'; ctx.fillRect(0,420,800,5);
        } else if(LEVEL.mode === 'circus'){
            for(let x=0;x<800;x+=80){ ctx.fillStyle='rgba(200,0,30,0.22)'; ctx.fillRect(x,0,40,576); }
            ctx.fillStyle='#a06820'; ctx.fillRect(0,390,800,200);
            ctx.fillStyle='#c08030'; ctx.fillRect(0,390,800,5);
            const tbc=['#ff0','#f00','#00f','#0f0','#f80','#f0f'];
            for(let x=0;x<800;x+=60){
                ctx.fillStyle=tbc[Math.floor(x/60)%tbc.length];
                ctx.beginPath(); ctx.moveTo(x+15,48); ctx.lineTo(x+42,48); ctx.lineTo(x+28,68); ctx.closePath(); ctx.fill();
            }
        } else if(LEVEL.mode === 'castle'){
            // Stone brick walls
            ctx.fillStyle='rgba(55,28,10,0.5)';
            for(let row=0;row<14;row++){
                for(let col=-1;col<14;col++) ctx.fillRect(col*80+(row%2?40:0)+2,row*32+2,76,28);
            }
            // Lava floor
            const lvg=ctx.createLinearGradient(0,390,0,576);
            lvg.addColorStop(0,'#ff4400'); lvg.addColorStop(1,'#881100');
            ctx.fillStyle=lvg; ctx.fillRect(0,390,800,200);
            ctx.fillStyle='rgba(255,140,0,0.6)';
            for(let x=0;x<800;x+=90){ ctx.beginPath(); ctx.ellipse(x+40,394,25,10,0,0,Math.PI*2); ctx.fill(); }
            // Torches
            const tf=Date.now()*0.004;
            [120,280,440,600,760].forEach((tx,i)=>{
                ctx.fillStyle='#8b4513'; ctx.fillRect(tx-3,340,6,28);
                const fg2=ctx.createRadialGradient(tx,338,0,tx,338,22);
                fg2.addColorStop(0,'rgba(255,255,100,0.9)'); fg2.addColorStop(1,'rgba(200,0,0,0)');
                ctx.fillStyle=fg2;
                ctx.beginPath(); ctx.ellipse(tx,335+Math.sin(tf+i)*3,8,16,0,0,Math.PI*2); ctx.fill();
            });
        } else {
            drawCloud(100,60); drawCloud(480,45,1.1); drawCloud(660,75,0.85);
            ctx.fillStyle='#777'; ctx.fillRect(0,380,800,100);
            ctx.fillStyle='#ff0'; for(let x=0;x<800;x+=88) ctx.fillRect(x+4,393,50,5);
        }
        ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.beginPath(); ctx.roundRect(100,55,600,310,16); ctx.fill();
        ctx.strokeStyle='rgba(100,160,255,0.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(100,55,600,310,16); ctx.stroke();
        ctx.textAlign='center';
        ctx.shadowColor='#0044cc'; ctx.shadowBlur=15;
        ctx.font='bold 52px monospace'; ctx.fillStyle='#ffe066'; ctx.fillText("MARIO'S",400,122);
        ctx.fillStyle='#ff6060'; ctx.fillText("LANDERS",400,176);
        ctx.shadowBlur=0;
        ctx.font='20px monospace'; ctx.fillStyle='#99ccff'; ctx.fillText('World '+LEVEL.world+' \u2014 '+LEVEL.subtitle,400,218);
        ctx.font='12px monospace'; ctx.fillStyle='#77aadd';
        LEVEL.instructions.forEach((line,i) => ctx.fillText(line, 400, 252 + i*20));
        if(Math.floor(Date.now()/540)%2===0){
            ctx.font='bold 20px monospace'; ctx.fillStyle='#fff';
            ctx.shadowColor='#0088ff'; ctx.shadowBlur=10;
            ctx.fillText('\u25b6  PRESS ENTER TO START  \u25c0',400,340);
            ctx.shadowBlur=0;
        }
        return;
    }

    ctx.save();
    ctx.translate(-Math.floor(camera.x),-Math.floor(camera.y));

    if(LEVEL.mode === 'underwater'){
        drawUnderwaterBg();
        drawBubbles();
        drawSeabed();
        drawFlagpole();
        drawDestination();
        entities.forEach(e=>e.draw(ctx));
        if(player) drawMarioSwimming(player);
    } else if(LEVEL.mode === 'circus'){
        drawCircusBg();
        drawCircusPoles();
        drawBunting();
        drawCircusFloor();
        drawCircusDestination();
        drawFlagpole();
        entities.forEach(e=>e.draw(ctx));
        if(player) player.draw(ctx);
    } else if(LEVEL.mode === 'castle'){
        drawCastleBg();
        drawCastleTorches();
        drawCastleFloor();
        drawCastleEnd();
        drawPrincess();
        drawFlagpole();
        entities.forEach(e=>e.draw(ctx));
        if(player) player.draw(ctx);
    } else {
        drawSky();
        drawValleyTerrain();
        [[180,80],[460,55,1.2],[820,90,0.9],[1200,60,1.1],[1550,80],[1920,55,1.3],[2400,70],[2800,85],[3200,55,1.1]].forEach(([x,y,s])=>drawCloud(x,y,s||1));
        [120,380,650,950,1200,1540,1900,2200,2550,2900,3100].forEach(x=>drawTree(x));
        drawGrass();
        drawRoad();
        if(DOWNHILL_X1>0) drawDownhillSign();
        drawDestination();
        drawFlagpole();
        entities.forEach(e=>e.draw(ctx));
        if(player) player.draw(ctx);
    }

    particles.forEach(p=>{
        ctx.globalAlpha=1-p.age/p.life; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r||3,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
    ctx.restore();

    // Screen-space speed lines during downhill
    if(downhillIntensity>0.1 && gameState===STATE.PLAYING){
        const di=downhillIntensity;
        ctx.save(); ctx.globalAlpha=di*0.35;
        ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
        const t=Date.now()*0.35;
        for(let i=0;i<10;i++){
            const lx=((t*1.8+i*79)%880)-40;
            const ly=80+i*38;
            ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx-60*di,ly+6); ctx.stroke();
        }
        ctx.restore();
        // Downhill banner
        ctx.save(); ctx.globalAlpha=di*0.8;
        ctx.fillStyle='#ff8800'; ctx.font='bold 15px monospace'; ctx.textAlign='center';
        ctx.shadowColor='#ff4400'; ctx.shadowBlur=10;
        ctx.fillText('\u2193 DOWNHILL \u2013 HOLD ON! \u2193',400,60);
        ctx.shadowBlur=0; ctx.restore();
    }

    if(gameState===STATE.DYING){ ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,0,800,576); }
    drawLetterHUD();

    // ── HUD ──
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,800,40);
    ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fillRect(0,38,800,2);
    ctx.font='bold 15px monospace'; ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillStyle='#aaa'; ctx.textAlign='left'; ctx.fillText(LEVEL.charName,16,14);
    ctx.fillStyle='#fff'; ctx.fillText(score.toString().padStart(6,'0'),16,30);
    ctx.fillStyle='#aaa'; ctx.fillText(LEVEL.collectLabel,120,14);
    ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(129,25,5,Math.PI,0); ctx.fill(); ctx.fillRect(127,25,4,4);
    ctx.fillStyle='#fff'; ctx.fillText('\xd7'+String(collectCount).padStart(2,'0'),140,30);
    ctx.fillStyle='#aaa'; ctx.textAlign='center'; ctx.fillText('WORLD '+LEVEL.world,400,14);
    ctx.fillStyle='#fff'; ctx.fillText(LEVEL.title,400,30);
    // Power-up indicators
    if(player && player.fire){
        ctx.fillStyle='#ff6600'; ctx.textAlign='right'; ctx.font='bold 13px monospace';
        ctx.shadowColor='#ff4400'; ctx.shadowBlur=8;
        ctx.fillText('🔥 FIRE',784,18);
        ctx.shadowBlur=0;
    } else if(player && player.big){
        ctx.fillStyle='#ff8800'; ctx.textAlign='right'; ctx.font='bold 13px monospace';
        ctx.fillText('🍄 BIG',784,18);
    }
    ctx.shadowBlur=0;
    if(gameState===STATE.WIN){
        const wg=ctx.createLinearGradient(0,0,0,576);
        wg.addColorStop(0,'rgba(0,30,100,0.93)'); wg.addColorStop(1,'rgba(0,80,180,0.93)');
        ctx.fillStyle=wg; ctx.fillRect(0,0,800,576);
        for(let i=0;i<7;i++) drawStarShape(ctx,57+i*114,(i%2===0?65:110),5,18,8,'#FFD700');
        ctx.textAlign='center'; ctx.shadowColor='#0066ff'; ctx.shadowBlur=22;
        ctx.font='bold 46px monospace'; ctx.fillStyle='#ffe066'; ctx.fillText('MARIO MADE IT!',400,148);
        ctx.shadowBlur=0;
        ctx.font='22px monospace'; ctx.fillStyle='#fff'; ctx.fillText(LEVEL.winMessage,400,198);
        ctx.font='20px monospace'; ctx.fillStyle='#aaddff'; ctx.fillText('Score: '+score+'  '+LEVEL.collectLabel+': '+collectCount,400,242);
        if(Math.floor(Date.now()/550)%2===0){ ctx.font='18px monospace'; ctx.fillStyle='#88ccff'; ctx.fillText('ENTER \u2014 play again   ESC \u2014 world select',400,306); }
    }
}
</script>
